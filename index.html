<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bachitter Singh Associates — Architecture & Design Studio</title>
    <meta name="description" content="Award-winning architecture and design studio creating timeless spaces for residential, commercial, and urban environments." />
    <meta name="author" content="Bachitter Singh Associates" />

    <meta property="og:title" content="Bachitter Singh Associates — Architecture & Design Studio" />
    <meta property="og:description" content="Award-winning architecture and design studio creating timeless spaces." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo1.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="/logo1.png" />
    <link rel="icon" type="image/png" href="/logo1.png" />

    <!-- ── Font preconnect + preload (eliminates render-blocking) ──── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" />
    </noscript>

    <!-- ── Preload hero poster for fast LCP ──────────────────────────── -->
    <link rel="preload" as="image" href="/architecture/building_view_poster.webp" type="image/webp" />
    <link rel="preload" as="image" href="/logo1.png" />

    <!-- ── Preload first hero video — begins fetching before JS runs ── -->
    <link rel="preload" as="video" href="/architecture/lord.mp4" type="video/mp4" fetchpriority="high" />
    
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        z-index: 9999;
        font-family: 'Inter', system-ui, sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="preloader">
      <div class="preloader-content">
        <p>Inventive. Intuitive. Timeless.</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
